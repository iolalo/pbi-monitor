name: PBI Monitor — Update data

on:
  schedule:
    - cron: "0 11 * * 1-5"   # 08:00 ART (UTC-3), lunes a viernes
  workflow_dispatch:           # ejecución manual desde GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch Power BI data
        env:
          PBI_TENANT_ID:    ${{ secrets.PBI_TENANT_ID }}
          PBI_CLIENT_ID:    ${{ secrets.PBI_CLIENT_ID }}
          PBI_REFRESH_TOKEN: ${{ secrets.PBI_REFRESH_TOKEN }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/fetch_data.py

      - name: Commit & push data
        run: |
          git config user.name  "pbi-monitor[bot]"
          git config user.email "pbi-monitor@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || (
            git commit -m "data: update $(date -u +'%Y-%m-%d %H:%M') UTC" &&
            git push
          )
